<!doctype html>
<html lang="es-AR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Manual tecnico de campo de Calibra Cinta para controles y calibraciones de balanzas dinamicas." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://mendex87.com/manual" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Manual tecnico de campo Calibra Cinta" />
  <meta property="og:description" content="Acceso al manual operativo de campo de Calibra Cinta." />
  <meta property="og:url" content="https://mendex87.com/manual" />
  <title>Manual tecnico de campo Calibra Cinta</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap');

    :root {
      color: #0c0b11;
      background: #f0efeb;
      font-family: Inter, system-ui, sans-serif;
      --orange: #ff5949;
      --orange-dark: #d94135;
      --ink: #0c0b11;
      --paper: #f0efeb;
      --paper-strong: #faf9f6;
      --border: rgba(12, 11, 17, 0.16);
      --radius: 0.35rem;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      background:
        linear-gradient(90deg, transparent 0 49%, rgba(255, 89, 73, 0.1) 49% 51%, transparent 51% 100%) center top / min(1180px, calc(100vw - 2rem)) 100% no-repeat,
        linear-gradient(rgba(12, 11, 17, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(12, 11, 17, 0.045) 1px, transparent 1px),
        radial-gradient(circle at 18% 0%, rgba(255, 89, 73, 0.16), transparent 28rem),
        var(--paper);
      background-size: min(1180px, calc(100vw - 2rem)) 100%, 28px 28px, 28px 28px, auto, auto;
    }

    main {
      width: min(980px, calc(100% - 32px));
      margin: 0 auto;
      padding: 18px 0 64px;
    }

    .card {
      position: relative;
      min-height: min(620px, calc(100vh - 36px));
      display: grid;
      align-content: space-between;
      gap: 32px;
      overflow: hidden;
      padding: clamp(24px, 4vw, 46px);
      color: var(--paper-strong);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius);
      background:
        linear-gradient(rgba(255, 255, 255, 0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.055) 1px, transparent 1px),
        radial-gradient(circle at top left, rgba(255, 89, 73, 0.52), transparent 420px),
        linear-gradient(135deg, #0c0b11, #19171a 72%, #2e2930);
      background-size: 26px 26px, 26px 26px, auto, auto;
      box-shadow: 0 1.25rem 3rem rgba(12, 11, 17, 0.22);
    }

    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.26;
      pointer-events: none;
      background: repeating-linear-gradient(115deg, transparent 0 16px, rgba(240, 239, 235, 0.08) 16px 17px, transparent 17px 34px);
    }

    .card > * {
      position: relative;
      z-index: 1;
    }

    h1 {
      max-width: 9ch;
      margin: 0 0 18px;
      font-family: "Barlow Condensed", Inter, sans-serif;
      font-size: clamp(54px, 11vw, 118px);
      line-height: 0.82;
      text-transform: uppercase;
      letter-spacing: -0.05em;
    }

    p {
      max-width: 650px;
      margin: 0;
      color: rgba(240, 239, 235, 0.76);
      font-size: 18px;
    }

    .links {
      display: grid;
      gap: 12px;
      max-width: 360px;
    }

    a {
      display: inline-flex;
      min-height: 46px;
      align-items: center;
      justify-content: center;
      padding: 0 18px;
      border: 1px solid var(--orange-dark);
      border-radius: var(--radius);
      color: var(--ink);
      background-image: linear-gradient(105deg, var(--orange) 0 50%, var(--ink) 50% 100%);
      background-size: 220% 100%;
      font-family: "Barlow Condensed", Inter, sans-serif;
      font-size: 1.05rem;
      font-weight: 800;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      transition: background-position 0.32s ease, color 0.32s ease, transform 0.32s ease;
    }

    a:hover {
      color: var(--paper);
      background-position: 100% 0;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>Manual Calibra Cinta</h1>
      <p>Acceso publico al manual tecnico de campo.</p>
      <p>Version documentada v4.0.0.</p>
      <div class="links">
        <a href="/manual/tecnico/">Manual tecnico de campo</a>
      </div>
    </section>
  </main>
</body>
</html>
